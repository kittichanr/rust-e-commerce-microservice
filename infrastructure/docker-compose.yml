version: "3.8"

services:
  # MySQL Database
  auth-db:
    image: mysql:8.0
    container_name: ecommerce-auth-db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: auth_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-prootpassword",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  # Auth Service
  auth-service:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    container_name: ecommerce-auth-service
    ports:
      - "50051:50051"
    environment:
      DATABASE_URL: mysql://root:password@auth-db:3306/auth_db
      RUST_LOG: info
      SERVICE_PORT: 50051
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  ecommerce-network:
    driver: bridge

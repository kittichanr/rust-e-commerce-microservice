info:
  name: Get Order list
  type: http
  seq: 10

http:
  method: GET
  url: http://localhost:8080/api/orders?page=1&page_size=3
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
  params:
    - name: page
      value: "1"
      type: query
    - name: page_size
      value: "3"
      type: query
  body:
    type: json
    data: ""
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

version: "3.8"

services:
  # MySQL Database for Auth Service
  auth-db:
    image: mysql:8.0
    container_name: ecommerce-auth-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      MYSQL_DATABASE: ${AUTH_DB_NAME:-auth_db}
    ports:
      - "${AUTH_DB_PORT:-3306}:3306"
    volumes:
      - auth_mysql_data:/var/lib/mysql
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-ppassword",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  # MySQL Database for Product Service
  product-db:
    image: mysql:8.0
    container_name: ecommerce-product-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      MYSQL_DATABASE: ${PRODUCT_DB_NAME:-product_db}
    ports:
      - "${PRODUCT_DB_PORT:-3307}:3306"
    volumes:
      - product_mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-ppassword",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  # MySQL Database for Order Service
  order-db:
    image: mysql:8.0
    container_name: ecommerce-order-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      MYSQL_DATABASE: ${ORDER_DB_NAME:-order_db}
    ports:
      - "${ORDER_DB_PORT:-3308}:3306"
    volumes:
      - order_mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-ppassword",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network
  # Auth Service
  auth-service:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    container_name: ecommerce-auth-service
    ports:
      - "${AUTH_SERVICE_PORT:-50051}:50051"
    environment:
      DATABASE_URL: ${AUTH_DATABASE_URL:-mysql://root:password@auth-db:3306/auth_db}
      RUST_LOG: ${RUST_LOG:-info}
      SERVICE_PORT: 50051
      # JWT Configuration - loaded from .env file
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_EXPIRY_MINUTES: ${JWT_ACCESS_EXPIRY_MINUTES:-15}
      JWT_REFRESH_EXPIRY_DAYS: ${JWT_REFRESH_EXPIRY_DAYS:-7}
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped
  # Product Service (Database Setup Only)
  # Uncomment to run database initialization in Docker
  product-service:
    build:
      context: ..
      dockerfile: services/product-service/Dockerfile
    container_name: ecommerce-product-service
    ports:
      - "${PRODUCT_SERVICE_PORT:-50052}:50052"
    environment:
      DATABASE_URL: ${PRODUCT_DATABASE_URL:-mysql://root:password@product-db:3306/product_db}
      RUST_LOG: ${RUST_LOG:-info}
      SERVICE_PORT: 50052
      KAFKA_BROKERS: kafka:29092
    depends_on:
      product-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped

  # Order Service
  order-service:
    build:
      context: ..
      dockerfile: services/order-service/Dockerfile
    container_name: ecommerce-order-service
    ports:
      - "${ORDER_SERVICE_PORT:-50053}:50053"
    environment:
      DATABASE_URL: ${ORDER_DATABASE_URL:-mysql://root:password@order-db:3306/order_db}
      RUST_LOG: ${RUST_LOG:-info}
      SERVICE_PORT: 50053
      PRODUCT_SERVICE_URL: http://product-service:50052
      KAFKA_BROKERS: kafka:29092
    depends_on:
      order-db:
        condition: service_healthy
      product-service:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped

  # API Gateway
  # api-gateway:
  #   build:
  #     context: ..
  #     dockerfile: services/api-gateway/Dockerfile
  #   container_name: ecommerce-api-gateway
  #   ports:
  #     - "${GATEWAY_PORT:-8080}:8080"
  #   environment:
  #     GATEWAY__SERVER__HOST: 0.0.0.0
  #     GATEWAY__SERVER__PORT: 8080
  #     GATEWAY__SERVICES__AUTH_SERVICE_URL: http://auth-service:50051
  #     GATEWAY__SERVICES__PRODUCT_SERVICE_URL: http://product-service:50052
  #     GATEWAY__SERVICES__ORDER_SERVICE_URL: http://order-service:50053
  #     GATEWAY__JWT__SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  #     RUST_LOG: ${RUST_LOG:-info}
  #   depends_on:
  #     - auth-service
  #     - product-service
  #     - order-service
  #   networks:
  #     - ecommerce-network
  #   restart: unless-stopped

  # Zookeeper for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ecommerce-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ecommerce-network
    restart: unless-stopped

  # Kafka Message Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ecommerce-kafka
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - ecommerce-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  auth_mysql_data:
    driver: local
  product_mysql_data:
    driver: local
  order_mysql_data:
    driver: local

networks:
  ecommerce-network:
    driver: bridge

syntax = "proto3";

package product;

service Product {
  rpc CreateProduct(CreateProductRequest) returns (CreateProductResponse);
  rpc GetProduct(GetProductRequest) returns (GetProductResponse);
  rpc UpdateProduct(UpdateProductRequest) returns (UpdateProductResponse);
  rpc DeleteProduct(DeleteProductRequest) returns (DeleteProductResponse);
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse);
}

message CreateProductRequest {
  string sku              = 1;
  string name             = 2;
  optional string description  = 3;
  int64 price             = 4; // Price in cents (minor currency units)
  int32 stock_quantity    = 5;
  optional string category     = 6;
  optional string image_url    = 7;
  optional bool is_active      = 8;
}

message CreateProductResponse {
  bool success       = 1;
  string message     = 2;
  ProductInfo product = 3;
}

message GetProductRequest {
  string product_id = 1; // UUID as string
}

message GetProductResponse {
  bool success       = 1;
  string message     = 2;
  ProductInfo product = 3;
}

message UpdateProductRequest {
  string product_id         = 1; // UUID as string
  optional string sku       = 2;
  optional string name      = 3;
  optional string description = 4;
  optional int64 price      = 5;
  optional int32 stock_quantity = 6;
  optional string category  = 7;
  optional string image_url = 8;
  optional bool is_active   = 9;
}

message UpdateProductResponse {
  bool success       = 1;
  string message     = 2;
  ProductInfo product = 3;
}

message DeleteProductRequest {
  string product_id = 1; // UUID as string
}

message DeleteProductResponse {
  bool success = 1;
  string message = 2;
}

message ListProductsRequest {
  optional string category  = 1;
  optional bool is_active   = 2;
  optional int64 min_price  = 3;
  optional int64 max_price  = 4;
  optional string search    = 5;
  optional uint64 page      = 6;
  optional uint64 per_page  = 7;
}

message ListProductsResponse {
  bool success        = 1;
  string message      = 2;
  repeated ProductInfo products = 3;
  uint64 total        = 4;
  uint64 page         = 5;
  uint64 per_page     = 6;
  uint64 total_pages  = 7;
}

message ProductInfo {
  string product_id       = 1; // UUID as string
  string sku              = 2;
  string name             = 3;
  optional string description  = 4;
  int64 price             = 5; // Price in cents
  int32 stock_quantity    = 6;
  optional string category     = 7;
  optional string image_url    = 8;
  bool is_active          = 9;
  int64 created_at        = 10; // Unix timestamp
  int64 updated_at        = 11; // Unix timestamp
}

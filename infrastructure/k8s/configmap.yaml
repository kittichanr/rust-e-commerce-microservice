apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-config
  namespace: ecommerce
data:
  RUST_LOG: "info"
  AUTH_SERVICE_PORT: "50051"
  PRODUCT_SERVICE_PORT: "50052"
  ORDER_SERVICE_PORT: "50053"
  GATEWAY_PORT: "8080"
  KAFKA_BROKERS: "kafka:29092"
  # Database URLs (non-sensitive parts)
  AUTH_DB_HOST: "auth-db"
  PRODUCT_DB_HOST: "product-db"
  ORDER_DB_HOST: "order-db"
  MYSQL_DATABASE_AUTH: "auth_db"
  MYSQL_DATABASE_PRODUCT: "product_db"
  MYSQL_DATABASE_ORDER: "order_db"
  # Service discovery URLs
  PRODUCT_SERVICE_URL: "http://product-service:50052"
  AUTH_SERVICE_URL: "http://auth-service:50051"
  ORDER_SERVICE_URL: "http://order-service:50053"
  # Kafka configuration
  ZOOKEEPER_CLIENT_PORT: "2181"
  ZOOKEEPER_TICK_TIME: "2000"
  KAFKA_BROKER_ID: "1"
  KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
  KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
  KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
  KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

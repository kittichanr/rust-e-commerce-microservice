apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: ecommerce
  labels:
    app: order-service
spec:
  type: ClusterIP
  ports:
    - port: 50053
      targetPort: 50053
      protocol: TCP
      name: grpc
  selector:
    app: order-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: ecommerce
  labels:
    app: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      initContainers:
        # Wait for database to be ready
        - name: wait-for-db
          image: busybox:1.28
          command:
            - sh
            - -c
            - |
              until nc -z order-db 3306; do
                echo "Waiting for order-db..."
                sleep 2
              done
              echo "order-db is ready!"
        # Wait for Kafka to be ready
        - name: wait-for-kafka
          image: busybox:1.28
          command:
            - sh
            - -c
            - |
              until nc -z kafka 29092; do
                echo "Waiting for kafka..."
                sleep 2
              done
              echo "kafka is ready!"
        # Wait for product-service to be ready
        - name: wait-for-product-service
          image: busybox:1.28
          command:
            - sh
            - -c
            - |
              until nc -z product-service 50052; do
                echo "Waiting for product-service..."
                sleep 2
              done
              echo "product-service is ready!"
      containers:
        - name: order-service
          image: ecommerce-order-service:latest
          imagePullPolicy: Never  # Use local image for development
          ports:
            - containerPort: 50053
              name: grpc
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: ORDER_DATABASE_URL
            - name: RUST_LOG
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: RUST_LOG
            - name: SERVICE_PORT
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: ORDER_SERVICE_PORT
            - name: PRODUCT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: PRODUCT_SERVICE_URL
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: KAFKA_BROKERS
          livenessProbe:
            tcpSocket:
              port: 50053
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 50053
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

info:
  name: Create Product
  type: http
  seq: 4

http:
  method: POST
  url: http://localhost:8080/api/products
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
  body:
    type: json
    data: |-
      {
        "sku": "TEST-001",
        "name": "Test Product",
        "description": "Test description",
        "price": 1999,
        "stock_quantity": 100,
        "category": "Test",
        "image_url": "",
        "is_active": true
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

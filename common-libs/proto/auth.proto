syntax = "proto3";

package auth;

service Auth {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc GetUserInfo(GetUserInfoRequest) returns (GetUserInfoResponse);
}

message RegisterRequest {
  string email    = 1;
  string password = 2;
}

message RegisterResponse {
  bool   success = 1;
  string message = 2;
}

message LoginRequest {
  string email    = 1;
  string password = 2;
}

message LoginResponse {
  bool   success        = 1;
  string message        = 2;
  string access_token   = 3;
  string refresh_token  = 4;
  int64  expires_in     = 5; // access token expiry in seconds
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  bool   success        = 1;
  string message        = 2;
  string access_token   = 3;
  string refresh_token  = 4;
  int64  expires_in     = 5;
}

message LogoutRequest {
  string refresh_token = 1; // optional: revoke specific token, empty = revoke all
}

message LogoutResponse {
  bool   success = 1;
  string message = 2;
}

message GetUserInfoRequest {
  string access_token = 1; // JWT access token for authentication
}

message GetUserInfoResponse {
  bool   success     = 1;
  string message     = 2;
  UserInfo user_info = 3;
}

message UserInfo {
  string user_id     = 1; // UUID as string
  string email       = 2;
  bool   is_active   = 3;
  int64  created_at  = 4; // Unix timestamp
  int64  updated_at  = 5; // Unix timestamp
}
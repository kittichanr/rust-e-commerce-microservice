apiVersion: v1
kind: Secret
metadata:
  name: ecommerce-secrets
  namespace: ecommerce
type: Opaque
stringData:
  # MySQL root password (base64 encoded in production)
  MYSQL_ROOT_PASSWORD: "password"
  # JWT Secret - CHANGE THIS IN PRODUCTION
  JWT_SECRET: "your-super-secret-jwt-key-change-this-in-production"
  JWT_ACCESS_EXPIRY_MINUTES: "15"
  JWT_REFRESH_EXPIRY_DAYS: "7"
  # Database URLs with credentials
  AUTH_DATABASE_URL: "mysql://root:password@auth-db:3306/auth_db"
  PRODUCT_DATABASE_URL: "mysql://root:password@product-db:3306/product_db"
  ORDER_DATABASE_URL: "mysql://root:password@order-db:3306/order_db"

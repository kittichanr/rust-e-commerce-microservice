apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: ecommerce
  labels:
    app: auth-service
spec:
  type: ClusterIP
  ports:
    - port: 50051
      targetPort: 50051
      protocol: TCP
      name: grpc
  selector:
    app: auth-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: ecommerce
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      initContainers:
        # Wait for database to be ready
        - name: wait-for-db
          image: busybox:1.28
          command:
            - sh
            - -c
            - |
              until nc -z auth-db 3306; do
                echo "Waiting for auth-db..."
                sleep 2
              done
              echo "auth-db is ready!"
      containers:
        - name: auth-service
          image: ecommerce-auth-service:latest
          imagePullPolicy: Never  # Use local image for development
          ports:
            - containerPort: 50051
              name: grpc
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: AUTH_DATABASE_URL
            - name: RUST_LOG
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: RUST_LOG
            - name: SERVICE_PORT
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: AUTH_SERVICE_PORT
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: JWT_SECRET
            - name: JWT_ACCESS_EXPIRY_MINUTES
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: JWT_ACCESS_EXPIRY_MINUTES
            - name: JWT_REFRESH_EXPIRY_DAYS
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: JWT_REFRESH_EXPIRY_DAYS
          livenessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
